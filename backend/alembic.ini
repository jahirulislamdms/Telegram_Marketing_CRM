# Alembic configuration for the Telegram Marketing CRM backend.
# Run from the `backend/` directory, e.g.:  alembic upgrade head
[alembic]
script_location = app/db/migrations
prepend_sys_path = .
# The database URL is injected at runtime from app.config in env.py,
# so this placeholder is intentionally left blank.
sqlalchemy.url =

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
