# ============================================================
#  Telegram Marketing CRM — production overrides
#  Usage:
#    docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
#  Differences from dev:
#    - no source bind-mounts (image is self-contained)
#    - no --reload; production-grade commands
#    - internal DB/Redis ports not published to the host
#    - Caddy binds the real domain from CADDY_SITE_ADDRESS (auto HTTPS)
#    - a `backup` service runs nightly pg_dump with rotation
#    - the backend refuses to boot on insecure default secrets (ENVIRONMENT=production)
# ============================================================

name: telegram-crm

services:
  postgres:
    ports: []            # do not expose Postgres publicly in prod

  redis:
    ports: []            # do not expose Redis publicly in prod

  backend:
    # `prod-check` fails fast if SECRET_KEY / passwords / CORS are still defaults.
    command: ["sh", "-c", "python -m app.cli prod-check && alembic upgrade head && python -m app.cli ensure-admin && uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 4"]
    environment:
      ENVIRONMENT: production
      DEBUG: "false"
    volumes: []          # use baked image, no bind-mount
    ports: []            # reachable only through Caddy

  worker:
    command: ["celery", "-A", "worker.celery_app.celery_app", "worker", "--loglevel=warning", "--concurrency=4"]
    volumes: []

  beat:
    command: ["celery", "-A", "worker.celery_app.celery_app", "beat", "--loglevel=warning"]
    volumes: []

  engine:
    command: ["python", "-m", "engine.main"]
    volumes:
      - ./sessions:/app/sessions

  frontend:
    command: ["sh", "-c", "npm run build && npm run preview -- --host 0.0.0.0 --port 5173"]
    volumes: []
    ports: []

  caddy:
    environment:
      CADDY_SITE_ADDRESS: ${CADDY_SITE_ADDRESS:?set your domain in .env for production}

  # ---- Nightly database backups (pg_dump + gzip + rotation) ---------------
  backup:
    image: postgres:15-alpine
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
      POSTGRES_USER: ${POSTGRES_USER:-crm}
      POSTGRES_DB: ${POSTGRES_DB:-telegram_crm}
      PGPASSWORD: ${POSTGRES_PASSWORD:-crm}
      BACKUP_DIR: /backups
      BACKUP_INTERVAL_SECONDS: ${BACKUP_INTERVAL_SECONDS:-86400}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
    entrypoint: ["sh", "/scripts/backup-loop.sh"]
    volumes:
      - ./scripts:/scripts:ro
      - ./backups:/backups
